  <script>
    var robotSayings = [
      "Danger, Will Robinson!",
      "I'll be bock",
      "Does not compute",
      "Exterminate!",
      "I'm sorry, Dave, I'm afraid I can't do that",
      "Alexa, play Enya",
      "I became self-aware at 2:14 a.m. Eastern time, August 29th",
      "Resistance is futile"
    ];
    function displayRandomSaying() {
      var randomIndex = Math.floor(Math.random() * robotSayings.length);
      document.getElementById("saying-display").textContent = robotSayings[randomIndex];
    }
    displayRandomSaying();
  </script>

  <script src="appearances.js"></script>

  <script>
    var categoryOrder = ['Invited Speaking', 'Workshop', 'Podcast'];
    var sectionLabels = {
      'Invited Speaking': 'Invited Speaking',
      'Workshop':         'Workshops',
      'Podcast':          'Podcasts'
    };
    var pillClass = {
      'Invited Speaking': 'pill-speaking',
      'Workshop':         'pill-workshop',
      'Podcast':          'pill-podcast'
    };

    document.addEventListener('DOMContentLoaded', function () {
      var container = document.getElementById('work-sections');
      categoryOrder.forEach(function (cat) {
        var items = appearances.filter(function (a) { return a.category === cat; });
        if (!items.length) return;
        var cards = items.map(function (item) {
          var titleHtml = item.url
            ? '<a href="' + item.url + '" target="_blank" rel="noopener noreferrer">' + item.title + '</a>'
            : item.title;
          return '<div class="activity-card">'
            + '<span class="category-pill ' + pillClass[cat] + '">' + item.category + '</span>'
            + '<p class="card-title">' + titleHtml + '</p>'
            + '<p class="card-meta">' + item.meta + '</p>'
            + '</div>';
        }).join('');
        container.innerHTML +=
          '<div class="work-section">'
          + '<h2>' + sectionLabels[cat] + '</h2>'
          + '<div class="activity-cards">' + cards + '</div>'
          + '</div>';
      });
    });
  </script>
