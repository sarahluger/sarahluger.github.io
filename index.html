    (function () {
      var pillClass = {
        'Workshop':         'pill-workshop',

      };

      function renderAppearances() {
        var grid = document.getElementById('appearances-grid');
        if (!grid) return;
        grid.innerHTML = appearances.map(function (item) {
          var titleHtml = item.url
            ? '<a href="' + item.url + '" target="_blank" rel="noopener noreferrer">' + item.title + '</a>'
            : item.title;
          return '<div class="activity-card">'
            + '<span class="category-pill ' + pillClass[item.category] + '">' + item.category + '</span>'
            + '<p class="card-title">' + titleHtml + '</p>'
            + '<p class="card-meta">' + item.meta + '</p>'
            + '</div>';
        }).join('');
      }

      function renderPapers() {
        var grid = document.getElementById('papers-grid');
        if (!grid) return;
        grid.innerHTML = papers.map(function (item) {
          return '<div class="paper-item">'
            + '<p class="paper-venue">' + item.venue + '</p>'
            + '<p class="paper-title"><a href="' + item.url + '" target="_blank" rel="noopener noreferrer">' + item.title + '</a></p>'
            + '</div>';
        }).join('');
      }

      document.addEventListener('DOMContentLoaded', function () {
        renderAppearances();
        renderPapers();
      });
    }());
